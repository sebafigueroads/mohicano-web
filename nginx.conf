server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
    location = /v1 { try_files /v1-heritage.html =404; }
    location = /v2 { try_files /v2-bold.html =404; }
    location = /v3 { try_files /v3-premium.html =404; }
    location = /widgets { try_files /widgets.html =404; }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(html)$ { add_header Cache-Control "public, max-age=300, must-revalidate"; }
    location ~* \.(jpg|jpeg|png|webp|svg|woff2|ico|mp4|webm|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}
